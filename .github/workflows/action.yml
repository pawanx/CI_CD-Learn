name: Question 1

on:
  push:

jobs:
  hello:
    runs-on: ubuntu-latest

    steps:
      - name: Print Dynamic Info
        run: |
          echo "Hello ${{ github.actor }}"
          echo "You pushed to ${{ github.ref_name }}"
          echo "from repository ${{ github.event.repository.name }}"
          echo "at $(TZ=Asia/Kolkata date '+%Y-%m-%d %H:%M IST')"

      - name: Q2 - Deployment Receipt
        run: |
          echo "================================="
          echo "        DEPLOYMENT RECEIPT"
          echo "================================="
          echo ""
          echo "Repository   : ${{ github.event.repository.name }}"
          echo "Branch       : ${{ github.ref_name }}"
          echo "Triggered By : ${{ github.actor }}"
          echo "Event Type   : ${{ github.event_name }}"
          echo ""
          echo "Timestamp    : $(date)"
          echo ""
          echo "================================="

          
      - name: Q3 - Server Health Report
        run: |
          echo "📊 SERVER HEALTH REPORT"
          echo ""

          echo "Disk Usage:"
          df / | tail -1 | awk '{print $5}'
          echo ""

          echo "Memory Available:"
          free -h | awk '/Mem:/ {print $7}'
          echo ""

          echo "CPU Cores:"
          nproc
          echo ""

          echo "Node Version:"
          node -v
          echo ""

          echo "Python Version:"
          python3 --version | awk '{print $2}'
          echo ""

          echo "Health Status:"
          echo "✅ HEALTHY"
      